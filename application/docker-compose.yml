services:
  database:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: taskflow
      MYSQL_USER: taskflow
      MYSQL_PASSWORD: taskflow-local
      MYSQL_ROOT_PASSWORD: root-local
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot-local"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - mysql-data:/var/lib/mysql

  backend:
    build: ./backend
    environment:
      DB_HOST: database
      DB_PORT: 3306
      DB_NAME: taskflow
      DB_USER: taskflow
      DB_PASSWORD: taskflow-local
      APP_ENV: local
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mysql-data:
